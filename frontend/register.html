<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejestracja — LearnUp</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <a href="index.html" class="back-btn">← Wróć do strony głównej</a>

  <div class="auth-card">
    <a href="index.html" class="logo">Learn<span>Up</span></a>

    <h1>Dołącz do nas!</h1>
    <p class="subtitle">Masz już konto? <a href="login.html">Zaloguj się</a></p>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Imię i nazwisko *</label>
        <input type="text" id="name" placeholder="Jan Kowalski">
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="jan@example.com">
      </div>
      <div class="form-group">
        <label for="password">Hasło *</label>
        <input type="password" id="password" placeholder="Min. 8 znaków">
      </div>
      <div class="form-group">
        <label for="password2">Powtórz hasło *</label>
        <input type="password" id="password2" placeholder="Powtórz hasło">
      </div>
      <div id="registerMsg" class="form-msg"></div>
      <button type="submit" class="btn-primary btn-full">Utwórz konto</button>
    </form>
  </div>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
