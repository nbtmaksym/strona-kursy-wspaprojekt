<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nowe hasło — LearnUp</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">Learn<span>Up</span></a>

      <h1>Nowe hasło</h1>
      <p class="subtitle">Wpisz kod z emaila i ustaw nowe hasło. <a href="login.html">Wróć do logowania</a></p>

      <form id="newPasswordForm">
        <div class="form-group">
          <label>Kod weryfikacyjny</label>
          <input type="text" id="kod" placeholder="123456" maxlength="6">
        </div>
        <div class="form-group">
          <label>Nowe hasło</label>
          <input type="password" id="password" placeholder="Minimum 8 znaków">
        </div>
        <div class="form-group">
          <label>Powtórz hasło</label>
          <input type="password" id="password2" placeholder="Powtórz hasło">
        </div>
        <div id="newPasswordMsg" class="form-msg"></div>
        <button type="submit" class="btn-primary btn-full" id="newPasswordBtn">Zmień hasło →</button>
      </form>
    </div>
  </div>

  <script>
    const email = sessionStorage.getItem('reset_email');
    if (!email) {
      window.location.href = 'forgot-password.html';
    }

    document.getElementById('newPasswordForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const kod       = document.getElementById('kod').value.trim();
      const password  = document.getElementById('password').value.trim();
      const password2 = document.getElementById('password2').value.trim();
      const msg       = document.getElementById('newPasswordMsg');
      const btn       = document.getElementById('newPasswordBtn');

      msg.className = 'form-msg';
      msg.style.display = 'none';

      if (!kod || kod.length !== 6) {
        msg.style.display = 'block';
        msg.className = 'form-msg error';
        msg.textContent = '❌ Wpisz 6-cyfrowy kod';
        return;
      }

      if (password.length < 8) {
        msg.style.display = 'block';
        msg.className = 'form-msg error';
        msg.textContent = '❌ Hasło musi mieć minimum 8 znaków';
        return;
      }

      if (password !== password2) {
        msg.style.display = 'block';
        msg.className = 'form-msg error';
        msg.textContent = '❌ Hasła nie są identyczne';
        return;
      }

      btn.textContent = 'Zmienianie...';
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:8000/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:        email,
            kod:          kod,
            new_password: password
          })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.style.display = 'block';
          msg.className = 'form-msg error';
          msg.textContent = '❌ ' + data.detail;
          btn.textContent = 'Zmień hasło →';
          btn.disabled = false;
          return;
        }

        sessionStorage.removeItem('reset_email');

        msg.style.display = 'block';
        msg.className = 'form-msg success';
        msg.textContent = '✅ Hasło zostało zmienione! Przekierowuję do logowania...';

        setTimeout(function() {
          window.location.href = 'login.html';
        }, 1500);

      } catch(e) {
        msg.style.display = 'block';
        msg.className = 'form-msg error';
        msg.textContent = '❌ Błąd połączenia z serwerem';
        btn.textContent = 'Zmień hasło →';
        btn.disabled = false;
      }
    });
  </script>
<script src="js/chat.js"></script>
</body>
</html>
