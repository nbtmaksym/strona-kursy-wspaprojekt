<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Użytkownicy — LearnUp Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-sidebar-logo">
        <a href="../index.html" class="logo">Learn<span>Up</span></a>
        <span class="admin-badge">Admin</span>
      </div>
      <nav class="admin-nav">
        <a href="index.html" class="admin-nav-link">
          <span class="sidebar-icon">📊</span> Dashboard
        </a>
        <a href="kursy.html" class="admin-nav-link">
          <span class="sidebar-icon">📚</span> Kursy
        </a>
        <a href="uzytkownicy.html" class="admin-nav-link active">
          <span class="sidebar-icon">👥</span> Użytkownicy
        </a>
                <a href="wiadomosci.html" class="admin-nav-link" style="display:flex;align-items:center">
  <span class="sidebar-icon">💬</span> Wiadomości
  <span id="wiadBadge" style="display:none;background:#ff6b6b;color:white;font-size:0.7rem;font-weight:700;padding:2px 7px;border-radius:100px;margin-left:auto"></span>
</a>
<a href="kupony.html" class="admin-nav-link">
  <span class="sidebar-icon">🎟️</span> Kupony
</a>
<a href="statystyki.html" class="admin-nav-link">
  <span class="sidebar-icon">📈</span> Statystyki
</a>
<a href="powiadomienia.html" class="admin-nav-link">
  <span class="sidebar-icon">🔔</span> Powiadomienia
</a>
        <a href="#" onclick="logout()" class="admin-nav-link">
          <span class="sidebar-icon">🚪</span> Wyloguj
        </a>
      </nav>
    </aside>

    <main class="admin-content">
      <div class="admin-header">
        <div>
          <h1>Zarządzanie użytkownikami</h1>
          <p>Lista wszystkich zarejestrowanych użytkowników</p>
        </div>
        <button class="theme-btn" id="themeBtn">🌙</button>
      </div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Szukaj użytkownika..." oninput="filterUsers()">
      </div>

      <div class="table-container">
        <div class="table-header">
          <h3>Wszyscy użytkownicy</h3>
          <span style="color:var(--text-soft);font-size:0.9rem" id="usersCount">Ładowanie...</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Imię i nazwisko</th>
              <th>Email</th>
              <th>Rola</th>
              <th>Data rejestracji</th>
              <th>Status</th>
              <th>Akcje</th>
            </tr>
          </thead>
          <tbody id="usersTable">
            <tr><td colspan="6" style="color:var(--text-soft);text-align:center;padding:20px">Ładowanie...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    function zaladujStrone() { zaladujUzytkownikow(); }
  </script>
</body>
</html>
