<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset hasła — LearnUp</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="logo">Learn<span>Up</span></a>

      <h1>Reset hasła</h1>
      <p class="subtitle">Podaj email — wyślemy Ci kod do resetu. <a href="login.html">Wróć do logowania</a></p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="jan@example.com">
      </div>
      <div id="resetMsg" class="form-msg"></div>
      <button type="button" class="btn-primary btn-full" id="resetBtn" onclick="wyslijKod()">Wyślij kod →</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    async function wyslijKod() {
      const email = document.getElementById('email').value.trim();
      const msg   = document.getElementById('resetMsg');
      const btn   = document.getElementById('resetBtn');

      msg.className = 'form-msg';
      msg.style.display = 'none';

      if (!email || !email.includes('@')) {
        msg.style.display = 'block';
        msg.className = 'form-msg error';
        msg.textContent = '❌ Podaj prawidłowy email';
        return;
      }

      btn.textContent = 'Wysyłanie...';
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:8000/api/auth/reset-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });

        const data = await res.json();

        if (!res.ok) {
          msg.style.display = 'block';
          msg.className = 'form-msg error';
          msg.textContent = '❌ ' + (data.detail || 'Błąd serwera');
          btn.textContent = 'Wyślij kod →';
          btn.disabled = false;
          return;
        }

        // Wyslij email przez EmailJS
        try {
          emailjs.init('OauThvHsZTmta6WmX');
          emailjs.send('service_04jy9fz', 'template_zmumube', {
            imie:     data.name,
            kod:      data.kod,
            to_email: data.email
          });
        } catch(e) {}

        sessionStorage.setItem('reset_email', email);
        sessionStorage.setItem('reset_name', data.name);
        sessionStorage.setItem('reset_kod', data.kod);

        msg.style.display = 'block';
        msg.className = 'form-msg success';
        msg.textContent = '✅ Kod wygenerowany! Przekierowuję...';

        btn.textContent = 'Wyślij kod →';
        btn.disabled = false;

        setTimeout(function() {
          window.location.href = 'reset-password.html';
        }, 1000);

      } catch(e) {
        msg.style.display = 'block';
        msg.className = 'form-msg error';
        msg.textContent = '❌ Błąd połączenia z serwerem';
        btn.textContent = 'Wyślij kod →';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
