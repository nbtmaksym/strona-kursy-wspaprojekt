<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — LearnUp</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-card">
    <a href="index.html" class="logo">Learn<span>Up</span></a>

    <h1>Witaj z powrotem!</h1>
    <p class="subtitle">Nie masz konta? <a href="register.html">Zarejestruj się</a></p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jan@example.com">
      </div>

      <div class="form-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" placeholder="Twoje hasło">
      </div>

      <div id="loginMsg" class="form-msg"></div>

      <button type="submit" class="btn-primary btn-full">Zaloguj się</button>

      <div class="divider">lub</div>

      <a href="dashboard.html" class="btn-outline btn-full" style="text-align:center">
        Kontynuuj jako gość (demo)
      </a>
    </form>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
