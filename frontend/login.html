<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logowanie — LearnUp</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <a href="index.html" class="back-btn">← Wróć do strony głównej</a>

  <div class="auth-card">
    <a href="index.html" class="logo">Learn<span>Up</span></a>

    <h1>Witaj z powrotem!</h1>
    <p class="subtitle">Nie masz konta? <a href="register.html">Zarejestruj się</a></p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jan@example.com">
      </div>
      <div class="form-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" placeholder="Twoje hasło">
      </div>
      <div id="loginMsg" class="form-msg"></div>
      <button type="submit" class="btn-primary btn-full">Zaloguj się</button>
      <p style="text-align:center;margin-top:16px;font-size:0.88rem;color:var(--text-soft)">
  Zapomniałeś hasła? <a href="forgot-password.html" style="color:var(--accent)">Zresetuj hasło</a>
</p>
      </a>
    </form>
  </div>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
